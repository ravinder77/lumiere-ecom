apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiere-backend
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      name: lumiere-backend
      labels:
        app: backend
    spec:

      containers:
        - name: lumiere-backend
          image: docker.io/ravinder50300/lumiere-backend:v1.0.4
          imagePullPolicy: Always

          ports:
            - containerPort: 4000

          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "258Mi"

#          readinessProbe:
#            httpGet:
#              port: 4000
#              path: /ready
#            initialDelaySeconds: 15
#            periodSeconds: 5
#
#          livenessProbe:
#            httpGet:
#              port: 4000
#              path: /health
#            initialDelaySeconds: 20
#            periodSeconds: 10

      restartPolicy: Always
      