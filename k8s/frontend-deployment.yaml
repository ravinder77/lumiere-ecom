apiVersion: apps/v1
kind: Deployment
metadata:
  name: lumiere-frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      name: lumiere-frontend
      labels:
        app: frontend
    spec:
      containers:
        - name: lumiere-frontend
          image: docker.io/ravinder50300/lumiere-frontend:v1
          imagePullPolicy: Always

          ports:
            - containerPort: 8080

          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10

          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 20

      restartPolicy: Always
      