apiVersion: v1
kind: Service
metadata:
  name: {{ include "lumiere-backend.fullname" . }}
  labels:
    app.kubernetes.io/name: lumiere-backend
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{ include "lumiere-backend.selectorLabels" . | nindent 4 }}
