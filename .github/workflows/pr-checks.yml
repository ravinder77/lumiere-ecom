name: PR Checks

on:
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # Guard — skip draft PRs
  # ═══════════════════════════════════════════════════════════════════════════
  guard:
    name: PR Guard
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.check.outputs.skip }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event.pull_request.draft }}" = "true" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⏭️ Draft PR — skipping checks"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # Detect changed files
  # ═══════════════════════════════════════════════════════════════════════════
  changes:
    name: Detect Changes
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      services: ${{ steps.filter.outputs.changes }}
      workflows: ${{ steps.filter.outputs.workflows }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            workflows:
              - '.github/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # 1 ▸ PR title lint (Conventional Commits)
  # ═══════════════════════════════════════════════════════════════════════════
  pr-title:
    name: PR Title Lint
    needs: guard
    if: needs.guard.outputs.skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            chore
            docs
            refactor
            test
            ci
            perf
            revert
          requireScope: false

  # ═══════════════════════════════════════════════════════════════════════════
  # 2 ▸ Secrets detection (fast gate)
  # ═══════════════════════════════════════════════════════════════════════════
  secrets-detect:
    name: Secrets Detection
    needs: [guard, changes]
    if: needs.guard.outputs.skip != 'true'
    uses: ./.github/workflows/reusable/_secrets-detect.yml
    with:
      service:      repo
      fail-on-leak: true

  # ═══════════════════════════════════════════════════════════════════════════
  # 3 ▸ Lint — matrix: client + server
  # ═══════════════════════════════════════════════════════════════════════════
  lint:
    name: Lint
    needs: [guard, changes]
    if: |
      needs.guard.outputs.skip != 'true' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    defaults:
      run:
        working-directory: ./${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install
        run: npm ci --prefer-offline
      - name: ESLint
        run: |
          if npm pkg get scripts.lint | grep -qv '^{}$'; then
            npm run lint -- --format=github
          else
            echo "No lint script for ${{ matrix.service }}; skipping."
          fi
      - name: Type check
        run: |
          if npm pkg get scripts.typecheck | grep -qv '^{}$'; then
            npm run typecheck
          elif npm pkg get scripts.build | grep -qv '^{}$'; then
            npm run build
          else
            echo "No typecheck or build script for ${{ matrix.service }}; skipping."
          fi

  # ═══════════════════════════════════════════════════════════════════════════
  # 4 ▸ Unit tests — matrix: client + server
  # ═══════════════════════════════════════════════════════════════════════════
  test:
    name: Unit Tests
    needs: [guard, changes, lint]
    if: |
      needs.guard.outputs.skip != 'true' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    defaults:
      run:
        working-directory: ./${{ matrix.service }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/package-lock.json
      - name: Install
        run: npm ci --prefer-offline
      - name: Run tests
        run: |
          if npm pkg get scripts.test | grep -qv '^{}$'; then
            npm test
          else
            echo "No test script for ${{ matrix.service }}; skipping."
          fi
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/coverage/
          if-no-files-found: ignore
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════════════
  # 5 ▸ SAST (PR scope)
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST
    needs: [guard, changes, secrets-detect]
    if: |
      needs.guard.outputs.skip != 'true' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/reusable/_sast.yml
    with:
      service:          ${{ matrix.service }}
      language:         javascript
    secrets:
      SONAR_TOKEN:       ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL:    ${{ secrets.SONAR_HOST_URL }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 6 ▸ SCA — dependency audit (PR scope)
  # ═══════════════════════════════════════════════════════════════════════════
  sca:
    name: SCA
    needs: [guard, changes]
    if: |
      needs.guard.outputs.skip != 'true' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/reusable/_sca.yml
    with:
      service:          ${{ matrix.service }}
      fail-on-severity: high
      generate-sbom:    false   # skip SBOM on PRs — generated post-merge


  # ═══════════════════════════════════════════════════════════════════════════
  # 7 ▸ Build check (no push) — validates Dockerfile compiles
  # ═══════════════════════════════════════════════════════════════════════════
  build-check:
    name: Build Check (no push)
    needs: [guard, changes, lint, test]
    if: |
      needs.guard.outputs.skip != 'true' &&
      (needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true')
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/reusable/_build.yml
    with:
      service:   ${{ matrix.service }}
      image-tag: pr-${{ github.event.pull_request.number }}
      push:      false   # dry-run only
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 8 ▸ PR status gate (all checks must pass)
  # ═══════════════════════════════════════════════════════════════════════════
  pr-gate:
    name: ✅ PR Gate
    runs-on: ubuntu-latest
    needs: [pr-title, secrets-detect, lint, test, sast, sca, build-check]
    if: always()
    steps:
      - name: Evaluate all checks
        run: |
          RESULTS='${{ toJson(needs) }}'
          FAILED=$(echo "$RESULTS" | python3 -c "
          import sys, json
          needs = json.load(sys.stdin)
          failed = [k for k, v in needs.items() if v.get('result') not in ('success', 'skipped')]
          print('\n'.join(failed))
          ")
          if [ -n "$FAILED" ]; then
            echo "❌ The following checks failed:"
            echo "$FAILED"
            exit 1
          fi
          echo "✅ All PR checks passed"
