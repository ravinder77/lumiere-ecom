name: Reusable › Deploy (GitOps)

on:
  workflow_call:
    inputs:
      service:
        description: "Service to deploy: frontend | backend"
        required: true
        type: string
      image-tag:
        description: "New image tag to deploy"
        required: true
        type: string
      image-digest:
        description: "Image digest for pinning"
        required: true
        type: string
      environment:
        description: "Target environment: dev | staging | prod"
        required: false
        type: string
        default: "dev"
      gitops-repo:
        description: "GitOps repository (org/repo)"
        required: false
        type: string
        default: "your-org/lumiere-gitops"
      gitops-branch:
        description: "Branch in GitOps repo to update"
        required: false
        type: string
        default: "main"
      helm-values-path:
        description: "Path to values file inside GitOps repo"
        required: false
        type: string
        default: ""   # auto-resolved from service + environment
    outputs:
      pr-url:
        description: "GitOps PR URL (prod) or commit URL (dev/staging)"
        value: ${{ jobs.deploy.outputs['pr-url'] }}
    secrets:
      GITOPS_TOKEN:
        required: true   # PAT with repo write access to lumiere-gitops

jobs:
  deploy:
    name: Deploy › ${{ inputs.service }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    permissions:
      contents: read

    outputs:
      pr-url: ${{ steps.commit.outputs['pr-url'] || steps.pr.outputs['pr-url'] }}

    steps:
      - name: Checkout GitOps repo
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.gitops-repo }}
          token:      ${{ secrets.GITOPS_TOKEN }}
          ref:        ${{ inputs.gitops-branch }}
          path:       gitops

      - name: Resolve values file path
        id: resolve
        run: |
          if [ -n "${{ inputs.helm-values-path }}" ]; then
            VALUES_PATH="${{ inputs.helm-values-path }}"
          else
            VALUES_PATH="apps/${{ inputs.environment }}/lumiere-${{ inputs.service }}/values.yaml"
          fi
          echo "values-path=${VALUES_PATH}" >> "$GITHUB_OUTPUT"

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag in values file
        id: update
        working-directory: gitops
        run: |
          VALUES_FILE="${{ steps.resolve.outputs['values-path'] }}"

          if [ ! -f "${VALUES_FILE}" ]; then
            echo "❌ Values file not found: ${VALUES_FILE}"
            exit 1
          fi

          # Update tag and digest
          yq -i ".image.tag    = \"${{ inputs.image-tag }}\""    "${VALUES_FILE}"
          yq -i ".image.digest = \"${{ inputs.image-digest }}\"" "${VALUES_FILE}"

          echo "Updated ${VALUES_FILE}:"
          cat "${VALUES_FILE}"

      - name: Configure git identity
        working-directory: gitops
        run: |
          git config user.name  "lumiere-bot"
          git config user.email "ci-bot@lumiere.internal"

      - name: Commit and push (dev / staging)
        id: commit
        if: inputs.environment != 'prod'
        working-directory: gitops
        run: |
          git add .
          git commit -m "chore(deploy): bump lumiere-${{ inputs.service }} to ${{ inputs.image-tag }} [${{ inputs.environment }}]

          Service:     lumiere-${{ inputs.service }}
          Environment: ${{ inputs.environment }}
          Tag:         ${{ inputs.image-tag }}
          Digest:      ${{ inputs.image-digest }}
          Triggered by: ${{ github.repository }}@${{ github.sha }}"

          git push origin ${{ inputs.gitops-branch }}

          COMMIT_URL="https://github.com/${{ inputs.gitops-repo }}/commit/$(git rev-parse HEAD)"
          echo "pr-url=${COMMIT_URL}" >> "$GITHUB_OUTPUT"

      - name: Open PR (prod — requires review)
        if: inputs.environment == 'prod'
        id: pr
        working-directory: gitops
        env:
          GH_TOKEN: ${{ secrets.GITOPS_TOKEN }}
        run: |
          BRANCH="deploy/lumiere-${{ inputs.service }}-${{ inputs.image-tag }}-prod"
          git checkout -b "${BRANCH}"
          git add .
          git commit -m "chore(deploy): bump lumiere-${{ inputs.service }} to ${{ inputs.image-tag }} [prod]"
          git push origin "${BRANCH}"

          PR_URL=$(gh pr create \
            --repo "${{ inputs.gitops-repo }}" \
            --base "${{ inputs.gitops-branch }}" \
            --head "${BRANCH}" \
            --title "🚀 Deploy lumiere-${{ inputs.service }} ${{ inputs.image-tag }} → prod" \
            --body "## Deployment Summary

          | Field       | Value |
          |-------------|-------|
          | Service     | \`lumiere-${{ inputs.service }}\` |
          | Environment | \`prod\` |
          | Image Tag   | \`${{ inputs.image-tag }}\` |
          | Digest      | \`${{ inputs.image-digest }}\` |
          | Source SHA  | \`${{ github.sha }}\` |
          | Pipeline    | [View run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}) |

          > ⚠️ This PR deploys to **production**. Requires approval before merge.")

          echo "pr-url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "### 🚀 GitOps Deploy — ${{ inputs.service }}"         >> "$GITHUB_STEP_SUMMARY"
          echo "| Field       | Value |"                              >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------|"                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| Image Tag   | \`${{ inputs.image-tag }}\` |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| GitOps Repo | \`${{ inputs.gitops-repo }}\` |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| Link        | ${{ steps.commit.outputs['pr-url'] || steps.pr.outputs['pr-url'] }} |" >> "$GITHUB_STEP_SUMMARY"
