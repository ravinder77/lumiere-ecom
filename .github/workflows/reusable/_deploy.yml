name: Reusable › Helm Deploy

on:
  workflow_call:
    inputs:
      service:
        description: "Service to deploy: frontend | backend"
        required: true
        type: string
      image-tag:
        description: "Image tag to deploy (SHA or semver)"
        required: true
        type: string
      environment:
        description: "Target environment: dev | staging | prod"
        required: true
        type: string
      helm-chart-path:
        description: "Path to Helm chart inside repo"
        required: false
        type: string
        default: ""   # auto-resolved from service
      dry-run:
        description: "Helm dry-run only (no actual deploy)"
        required: false
        type: boolean
        default: false

    outputs:
      release-name:
        description: "Helm release name"
        value: ${{ jobs.deploy.outputs.release-name }}
      deployed-image:
        description: "Full image URI that was deployed"
        value: ${{ jobs.deploy.outputs.deployed-image }}
    secrets:
      AWS_ROLE_ARN:
        required: true
      EKS_CLUSTER_NAME:
        required: true

jobs:
  deploy:
    name: Helm Deploy › lumiere-${{ inputs.service }} → ${{ inputs.environment }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}   # triggers GitHub env protection rules
    permissions:
      id-token: write
      contents: read

    outputs:
      release-name:   ${{ steps.meta.outputs.release-name }}
      deployed-image: ${{ steps.meta.outputs.image-uri }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ap-south-1

      - name: Set deploy metadata
        id: meta
        env:
          SERVICE: ${{ inputs.service }}
          ENV:     ${{ inputs.environment }}
          TAG:     ${{ inputs.image-tag }}
        run: |
          RELEASE="lumiere-${SERVICE}"
          NAMESPACE="lumiere-${ENV}"
          CHART="${{ inputs.helm-chart-path != '' && inputs.helm-chart-path || format('helm/lumiere-{0}', inputs.service) }}"
          VALUES="helm/lumiere-${SERVICE}/envs/${ENV}/values.yaml"
          ECR_REGISTRY="${{ vars.ECR_REGISTRY }}"
          IMAGE_URI="${ECR_REGISTRY}/lumiere-${SERVICE}:${TAG}"

          echo "release-name=${RELEASE}"   >> "$GITHUB_OUTPUT"
          echo "namespace=${NAMESPACE}"    >> "$GITHUB_OUTPUT"
          echo "chart=${CHART}"            >> "$GITHUB_OUTPUT"
          echo "values=${VALUES}"          >> "$GITHUB_OUTPUT"
          echo "image-uri=${IMAGE_URI}"    >> "$GITHUB_OUTPUT"

      - name: Update kubeconfig for EKS
        run: |
          aws eks update-kubeconfig \
            --name   ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ap-south-1

      - name: Create namespace (idempotent)
        run: |
          kubectl apply -f k8s/base/namespace/lumiere-${{ inputs.environment }}.yaml

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.0

      - name: Helm lint
        run: |
          helm lint ${{ steps.meta.outputs.chart }} \
            -f ${{ steps.meta.outputs.values }} \
            --set image.tag=${{ inputs.image-tag }}

      - name: Helm upgrade --install
        run: |
          helm upgrade --install \
            ${{ steps.meta.outputs.release-name }} \
            ${{ steps.meta.outputs.chart }} \
            --namespace   ${{ steps.meta.outputs.namespace }} \
            --create-namespace \
            -f            ${{ steps.meta.outputs.values }} \
            --set         image.tag=${{ inputs.image-tag }} \
            --set         image.repository=${{ vars.ECR_REGISTRY }}/lumiere-${{ inputs.service }} \
            --atomic \
            --timeout     5m \
            --wait \
            ${{ inputs.dry-run && '--dry-run' || '' }}

      - name: Verify rollout
        if: ${{ !inputs.dry-run }}
        run: |
          kubectl rollout status deployment/${{ steps.meta.outputs.release-name }} \
            -n ${{ steps.meta.outputs.namespace }} \
            --timeout=3m

      - name: Print pod status
        if: always()
        run: |
          kubectl get pods -n ${{ steps.meta.outputs.namespace }} \
            -l app=lumiere-${{ inputs.service }} \
            -o wide || true

      - name: Summary
        if: always()
        run: |
          echo "### 🚀 Helm Deploy — lumiere-${{ inputs.service }}"          >> "$GITHUB_STEP_SUMMARY"
          echo "| Field       | Value |"                                      >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------|"                                      >> "$GITHUB_STEP_SUMMARY"
          echo "| Environment | \`${{ inputs.environment }}\` |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| Release     | \`${{ steps.meta.outputs.release-name }}\` |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Image       | \`${{ steps.meta.outputs.image-uri }}\` |"   >> "$GITHUB_STEP_SUMMARY"
          echo "| Dry Run     | \`${{ inputs.dry-run }}\` |"                 >> "$GITHUB_STEP_SUMMARY"