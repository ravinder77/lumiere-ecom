name: Reusable › SAST

on:
  workflow_call:
    inputs:
      service:
        description: "Service to scan: frontend | backend"
        required: true
        type: string
      language:
        description: "Language hint: javascript | typescript | nodejs"
        required: false
        type: string
        default: "javascript"
      sonar-project-key:
        description: "SonarQube project key"
        required: false
        type: string
        default: ""
      fail-on-severity:
        description: "Semgrep severity threshold: ERROR | WARNING | INFO"
        required: false
        type: string
        default: "ERROR"
    outputs:
      semgrep-findings:
        description: "Number of Semgrep findings"
        value: ${{ jobs.semgrep.outputs.findings }}
      sonar-status:
        description: "SonarQube Quality Gate status"
        value: ${{ jobs.sonarqube.outputs['gate-status'] }}
    secrets:
      SEMGREP_APP_TOKEN:
        required: false
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

concurrency:
  group: sast-${{ github.ref }}-${{ inputs.service }}
  cancel-in-progress: true

jobs:
  # ─── Semgrep ────────────────────────────────────────────────────────────────
  semgrep:
    name:  Semgrep › ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    outputs:
      findings: ${{steps.parse.outputs.findings}}

    container:
      image: semgrep/semgrep

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Run Semgrep
        id: semgrep
        env:
          SEMGREP_APP_TOKEN: ${{secrets.SEMGREP_APP_TOKEN}}
        run: |
          semgrep ci \
          --config auto \
          --config p/owasp-top-ten \
          --config p/nodejs \
          --config p/react \
          --sarif \
          --output semgrep-${{ inputs.service }}.sarif \
          --severity ${{ inputs.fail-on-severity }} \
          ${{ inputs.service }}/ || true

      - name: Parse Findings
        id: parse
        run: |
          FINDINGS=$(cat semgrep-${{ inputs.service }}.sarif \
            | python3 -c "import sys,json; d=json.load(sys.stdin); \
              print(len(d.get('runs',[])[0].get('results',[])))" 2>/dev/null || echo "0")
          echo "findings=${FINDINGS}" >> "$GITHUB_OUTPUT"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: semgrep-${{ inputs.service }}.sarif
          category:   semgrep-${{ inputs.service }}

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: semgrep-${{ inputs.service }}-${{ github.run_id }}
          path: semgrep-${{ inputs.service }}.sarif
          retention-days: 30

      - name: Fail on findings
        if: steps.parse.outputs.findings != '0' && inputs.fail-on-severity == 'ERROR'
        run: |
          echo "❌ Semgrep found ${{ steps.parse.outputs.findings }} ERROR-level findings in ${{ inputs.service }}"
          exit 1
          
  # ─── SonarQube ───────────────

  sonarqube:
    name: SonarQube › ${{ inputs.service }}
    runs-on: ubuntu-latest
    needs: semgrep

    permissions:
      contents: read

    outputs:
      gate-status: ${{ steps.quality-gate.outputs.status }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          projectBaseDir: ./${{ inputs.service }}
          args: >
            "-Dsonar.projectName=lumiere-${{ inputs.service }}"
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.test.*,**/coverage/**
            -Dsonar.tests=tests/
            -Dsonar.test.exclusions=tests/**
            -Dsonar.verbose=true
          

      - name: SonarQube Quality Gate check
        if: env.SONAR_TOKEN != ''
        id: quality-gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          pollingTimeoutSec: 300

      - name: Summary
        if: always()
        run: |
          echo "### 🔍 SAST — ${{ inputs.service }}"                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool       | Result |"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| Semgrep    | \`${{ needs.semgrep.outputs.findings || 'skipped' }}\` findings |" >> "$GITHUB_STEP_SUMMARY"
          echo "| SonarQube  | Quality Gate: \`${{ steps.quality-gate.outputs.status || 'skipped' }}\` |"  >> "$GITHUB_STEP_SUMMARY"

