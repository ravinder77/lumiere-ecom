name: Reusable › SAST

on:
  workflow_call:
    inputs:
      service:
        description: "Service to scan: frontend | backend"
        required: true
        type: string
      language:
        description: "Language hint: javascript | typescript | nodejs"
        required: false
        type: string
        default: "javascript"
      sonar-project-key:
        description: "SonarQube project key"
        required: false
        type: string
        default: ""

    outputs:
      sonar-status:
        description: "SonarQube Quality Gate status"
        value: ${{ jobs.sonarqube.outputs['gate-status'] }}

    secrets:
      SONAR_TOKEN:
        required: false
      SONAR_HOST_URL:
        required: false

concurrency:
  group: sast-${{ github.ref }}-${{ inputs.service }}
  cancel-in-progress: true

jobs:

  # ─── SonarQube ───────────────
  sonarqube:
    name: SonarQube › ${{ inputs.service }}
    runs-on: ubuntu-latest

    permissions:
      contents: read

    outputs:
      gate-status: ${{ steps.quality-gate.outputs.status }}

    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

    steps:
      - name: Checkout
        if: env.SONAR_TOKEN != ''
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: SonarQube Scan
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ env.SONAR_HOST_URL }}
        with:
          projectBaseDir: ./${{ inputs.service }}
          args: >
            "-Dsonar.projectName=lumiere-${{ inputs.service }}"
            -Dsonar.projectKey=${{ inputs.sonar-project-key }}
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.sources=src
            -Dsonar.exclusions=**/node_modules/**,**/*.test.*,**/coverage/**
            -Dsonar.tests=tests/
            -Dsonar.test.exclusions=tests/**
            -Dsonar.verbose=true
          

      - name: SonarQube Quality Gate check
        if: env.SONAR_TOKEN != ''
        id: quality-gate
        uses: SonarSource/sonarqube-quality-gate-action@master
        env:
          SONAR_TOKEN: ${{ env.SONAR_TOKEN }}
        with:
          pollingTimeoutSec: 300

      - name: Summary
        if: always()
        run: |
          echo "### 🔍 SAST — ${{ inputs.service }}"                                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool       | Result |"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "|------------|--------|"                                                          >> "$GITHUB_STEP_SUMMARY"
          echo "| SonarQube  | Quality Gate: \`${{ steps.quality-gate.outputs.status || 'skipped' }}\` |"  >> "$GITHUB_STEP_SUMMARY"

