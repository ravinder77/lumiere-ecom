name: Reusable › Secrets Detection

on:
  workflow_call:
    inputs:
      service:
        description: "Service context label: frontend | backend | repo"
        required: false
        type: string
        default: "repo"

      scan-path:
        description: "Path to scan (relative to repo root)"
        required: false
        type: string
        default: "."

      fail-on-leak:
        description: "Fail the workflow if secrets are found"
        required: false
        type: boolean
        default: true

    outputs:
      leaks-found:
        description: "Whether any secrets were detected"
        value: ${{ jobs.gitleaks.outputs.leaks-found }}

concurrency:
  group: secrets-${{ github.ref }}-${{ inputs.service }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks › ${{ inputs.service }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF

    outputs:
      leaks-found: ${{ steps.scan.outputs.leaks-found }}

    steps:
      - name: Checkout (full history for accurate scanning)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        id: scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        

      - name: Set output flag
        if: always()
        run: |
          if [ -s gitleaks-results.sarif ]; then
            FINDINGS=$(cat gitleaks-results.sarif | python3 -c \
              "import sys,json; d=json.load(sys.stdin); print(len(d.get('runs',[])[0].get('results',[])))" 2>/dev/null || echo "0")
            echo "leaks-found=$( [ "$FINDINGS" -gt 0 ] && echo 'true' || echo 'false' )" >> "$GITHUB_OUTPUT"
          else
            echo "leaks-found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gitleaks-results.sarif
          category:   gitleaks-${{ inputs.service }}

      - name: Upload raw results artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: gitleaks-${{ inputs.service }}-${{ github.run_id }}
          path: gitleaks-results.sarif
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "### 🔐 Secrets Detection — ${{ inputs.service }}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Field       | Value |"                          >> "$GITHUB_STEP_SUMMARY"
          echo "|-------------|-------|"                          >> "$GITHUB_STEP_SUMMARY"
          echo "| Tool        | Gitleaks |"                       >> "$GITHUB_STEP_SUMMARY"
          echo "| Config      | \`gitleaks.toml\` |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| Leaks Found | \`${{ steps.scan.outputs.leaks-found }}\` |" >> "$GITHUB_STEP_SUMMARY"