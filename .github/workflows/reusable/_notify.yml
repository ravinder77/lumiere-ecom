name: Reusable › Notify

on:
  workflow_call:
    inputs:
      status:
        description: "Pipeline status: success | failure | cancelled"
        required: true
        type: string
      service:
        description: "Service label: client | server | all"
        required: false
        type: string
        default: "all"
      environment:
        description: "Deployment environment: dev | staging | prod"
        required: false
        type: string
        default: "dev"
      image-tag:
        description: "Deployed image tag"
        required: false
        type: string
        default: ""
      deploy-url:
        description: "GitOps PR or commit URL"
        required: false
        type: string
        default: ""
      run-url:
        description: "GitHub Actions run URL (auto-generated if empty)"
        required: false
        type: string
        default: ""
      custom-message:
        description: "Optional extra message to append"
        required: false
        type: string
        default: ""
    secrets:
      SLACK_WEBHOOK_URL:
        required: false

jobs:
  notify:
    name: Notify › ${{ inputs.status }}
    runs-on: ubuntu-latest
    permissions:
      contents: none

    steps:
      - name: Resolve metadata
        id: meta
        run: |
          # Status emoji and color
          case "${{ inputs.status }}" in
            success)   EMOJI="✅"; COLOR="#36a64f" ;;
            failure)   EMOJI="❌"; COLOR="#e01e5a" ;;
            cancelled) EMOJI="⚠️"; COLOR="#ECB22E" ;;
            *)         EMOJI="ℹ️"; COLOR="#0077B6" ;;
          esac

          RUN_URL="${{ inputs.run-url }}"
          if [ -z "${RUN_URL}" ]; then
            RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          fi

          SHORT_SHA="${{ github.sha }}"
          SHORT_SHA="${SHORT_SHA:0:7}"

          echo "emoji=${EMOJI}"       >> "$GITHUB_OUTPUT"
          echo "color=${COLOR}"       >> "$GITHUB_OUTPUT"
          echo "run-url=${RUN_URL}"   >> "$GITHUB_OUTPUT"
          echo "short-sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      # ── Slack notification ─────────────────────────────────────────────────
      - name: Slack notification
        if: secrets.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.26.0
        env:
          SLACK_WEBHOOK_URL:  ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        with:
          payload: |
            {
              "attachments": [
                {
                  "color": "${{ steps.meta.outputs.color }}",
                  "blocks": [
                    {
                      "type": "header",
                      "text": {
                        "type": "plain_text",
                        "text": "${{ steps.meta.outputs.emoji }} lumiere-ecom CI/CD — ${{ inputs.status }}"
                      }
                    },
                    {
                      "type": "section",
                      "fields": [
                        { "type": "mrkdwn", "text": "*Service:*\n`${{ inputs.service }}`" },
                        { "type": "mrkdwn", "text": "*Environment:*\n`${{ inputs.environment }}`" },
                        { "type": "mrkdwn", "text": "*Branch:*\n`${{ github.ref_name }}`" },
                        { "type": "mrkdwn", "text": "*Commit:*\n`${{ steps.meta.outputs.short-sha }}`" },
                        { "type": "mrkdwn", "text": "*Triggered by:*\n`${{ github.actor }}`" },
                        { "type": "mrkdwn", "text": "*Image Tag:*\n`${{ inputs.image-tag != '' && inputs.image-tag || 'N/A' }}`" }
                      ]
                    },
                    {
                      "type": "actions",
                      "elements": [
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Pipeline" },
                          "url": "${{ steps.meta.outputs.run-url }}"
                        },
                        {
                          "type": "button",
                          "text": { "type": "plain_text", "text": "View Commit" },
                          "url": "https://github.com/${{ github.repository }}/commit/${{ github.sha }}"
                        }
                      ]
                    }
                  ]
                }
              ]
            }


      - name: Summary
        run: |
          echo "### 🔔 Notification Sent"                              >> "$GITHUB_STEP_SUMMARY"
          echo "| Channel | Sent |"                                    >> "$GITHUB_STEP_SUMMARY"
          echo "|---------|------|"                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Slack   | ${{ secrets.SLACK_WEBHOOK_URL != '' && '✅' || '⏭️ skipped (no secret)' }} |" >> "$GITHUB_STEP_SUMMARY"