name: CI

on:
  push:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
      - ".github/actions/**"
  pull_request:
    branches: [main, develop]
    paths:
      - "frontend/**"
      - "backend/**"
      - ".github/workflows/**"
      - "helm/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  AWS_REGION:  ap-south-1
  IMAGE_TAG:   ${{ github.sha }}

# ─── Required secrets ────────────────────────────────────────────────────────
# AWS_ROLE_ARN          – OIDC role for ECR push + image pull
# SEMGREP_APP_TOKEN     – Semgrep Cloud (optional)
# SONAR_TOKEN           – SonarQube token (optional)
# SONAR_HOST_URL        – SonarQube host URL (optional)
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  # ═══════════════════════════════════════════════════════════════════════════
  # 0 ▸ Detect which services changed
  # ═══════════════════════════════════════════════════════════════════════════
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      services: ${{ steps.filter.outputs.changes }}
      frontend:   ${{ steps.filter.outputs.frontend }}
      backend:   ${{ steps.filter.outputs.backend }}
      helm: ${{steps.filter.outputs.helm}}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
              - '.github/workflows/**'
              - '.github/actions/**'
            backend:
              - 'backend/**'
              - '.github/workflows/**'
              - '.github/actions/**'
            helm:
              - 'helm/frontend/**'
              - 'helm/backend/**'

  # ═══════════════════════════════════════════════════════════════════════════
  # 1 ▸ Secrets detection (repo-wide, runs once)
  # ═══════════════════════════════════════════════════════════════════════════
  secrets-detect:
    name: Secrets Detection
    needs: changes
    uses: ./.github/workflows/reusable/_secrets-detect.yml
    with:
      service:       repo
      scan-path:     "."
      fail-on-leak:  true

  # ═══════════════════════════════════════════════════════════════════════════
  # 2 ▸ SAST — matrix: frontend + backend
  # ═══════════════════════════════════════════════════════════════════════════
  sast:
    name: SAST
    needs: [changes, secrets-detect]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}
    uses: ./.github/workflows/reusable/_sast.yml
    with:
      service:          ${{ matrix.service }}
      language:         javascript
      fail-on-severity: ERROR
    secrets:
      SONAR_TOKEN:       ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL:    ${{ secrets.SONAR_HOST_URL }}


  # ═══════════════════════════════════════════════════════════════════════════
  # 3 ▸ SCA — matrix per changed service
  # ═══════════════════════════════════════════════════════════════════════════
  sca:
    name: SCA
    needs: [ changes, secrets-detect ]
    if: needs.changes.outputs.frontend == 'true' || needs.changes.outputs.backend == 'true'
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.changes.outputs.services) }}

    uses: ./.github/workflows/reusable/_sca.yml
    with:
      service: ${{ matrix.service }}
      fail-on-severity: high


  # ═══════════════════════════════════════════════════════════════════════════
  # 4 ▸ Build & push — split by service so outputs stay service-specific
  # ═══════════════════════════════════════════════════════════════════════════
  build-frontend:
    name: Build & Push › frontend
    needs: [changes, sast, sca]
    if: needs.changes.outputs.frontend == 'true'

    uses: ./.github/workflows/reusable/_build.yml
    with:
      service:   frontend
      image-tag: ${{ github.sha }}
      push:      ${{ github.event_name != 'pull_request' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  build-backend:
    name: Build & Push › backend
    needs: [ changes, sast, sca ]
    if: needs.changes.outputs.backend == 'true'

    uses: ./.github/workflows/reusable/_build.yml
    with:
      service: backend
      image-tag: ${{ github.sha }}
      push: ${{ github.event_name != 'pull_request' }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  # ═══════════════════════════════════════════════════════════════════════════
  # 5 ▸ Container scan
  # ═══════════════════════════════════════════════════════════════════════════
  container-scan-frontend:
    name: Container Scan › Frontend
    needs: [changes, build-frontend]
    if: |
      github.event_name != 'pull_request' &&
      needs.changes.outputs.frontend == 'true'
      

    uses: ./.github/workflows/reusable/_container-scan.yml
    with:
      service:          frontend
      image-uri:        ${{ needs.build-frontend.outputs['image-uri'] }}
      severity:         CRITICAL,HIGH
      fail-on-findings: true
      ignore-unfixed:   true
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  container-scan-backend:
    name: Container Scan › Backend
    needs: [ changes, build-backend ]
    if: |
      github.event_name != 'pull_request' &&
      needs.changes.outputs.backend == 'true'


    uses: ./.github/workflows/reusable/_container-scan.yml
    with:
      service: backend
      image-uri: ${{ needs.build-backend.outputs['image-uri'] }}
      severity: CRITICAL,HIGH
      fail-on-findings: true
      ignore-unfixed: true
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}




  # ═══════════════════════════════════════════════════════════════════════════
  # 6 ▸ Sign & Attest
  # ═══════════════════════════════════════════════════════════════════════════
  sign-attest-frontend:
    name: Sign & Attest › Frontend
    needs: [changes, build-frontend, container-scan-frontend]
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' && (needs.changes.outputs.frontend == 'true')

    uses: ./.github/workflows/reusable/_sign-attest.yml
    with:
      service:      frontend
      image-uri:    ${{ needs.build-frontend.outputs['image-uri'] }}
      image-digest: ${{ needs.build-frontend.outputs['image-digest'] }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}

  sign-attest-backend:
    name: Sign & Attest › Backend
    needs: [ changes, build-backend, container-scan-backend ]
    if: |
      github.event_name != 'pull_request' &&
      github.ref == 'refs/heads/main' && (needs.changes.outputs.backend == 'true')

    uses: ./.github/workflows/reusable/_sign-attest.yml
    with:
      service: backend
      image-uri: ${{ needs.build-backend.outputs['image-uri'] }}
      image-digest: ${{ needs.build-backend.outputs['image-digest'] }}
    secrets:
      AWS_ROLE_ARN: ${{ secrets.AWS_ROLE_ARN }}



  # ═══════════════════════════════════════════════════════════════════════════
  # 6 ▸ Deploy to dev
  # ═══════════════════════════════════════════════════════════════════════════
  deploy-dev-frontend:
    name: Deploy › dev › Frontend
    needs: [changes, build-frontend, sign-attest-frontend]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.frontend == 'true'
    uses: ./.github/workflows/reusable/_deploy.yml
    with:
      service:       frontend
      image-tag:     ${{ github.sha }}
      environment: dev

  deploy-dev-backend:
    name: Deploy › dev › Backend
    needs: [changes, build-backend, sign-attest-backend]
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.changes.outputs.backend == 'true'
    uses: ./.github/workflows/reusable/_deploy.yml
    with:
      service:       backend
      image-tag:     ${{ github.sha }}
      environment:   dev

  # ═══════════════════════════════════════════════════════════════════════════
  # 7 ▸ Pipeline summary
  # ═══════════════════════════════════════════════════════════════════════════
  summary:
    name: Pipeline Summary
    runs-on: ubuntu-latest
    needs:
      - secrets-detect
      - sast
      - sca
      - build-frontend
      - build-backend
      - container-scan-frontend
      - container-scan-backend
      - sign-attest-frontend
      - sign-attest-backend
      - deploy-dev-frontend
      - deploy-dev-backend
    if: always()
    steps:
      - name: Write summary
        run: |
          echo "# Lumiere CI/CD Pipeline"                  >> "$GITHUB_STEP_SUMMARY"
          echo ""                                               >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit:** \`${{ github.sha }}\` | **Branch:** \`${{ github.ref_name }}\` | **Actor:** \`${{ github.actor }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                               >> "$GITHUB_STEP_SUMMARY"
          echo "## Security"                                    >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage          | Status  |"                   >> "$GITHUB_STEP_SUMMARY"
          echo "|----------------|-------- |"                   >> "$GITHUB_STEP_SUMMARY"
          echo "| Secrets Detect           | ${{ needs.secrets-detect.result }} |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| SAST                     | ${{ needs.sast.result }} |"            >> "$GITHUB_STEP_SUMMARY"
          echo "| SCA                      | ${{ needs.sca.result }} |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Scan Frontend  | ${{ needs.container-scan-frontend.result }} |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Container Scan Backend   | ${{ needs.container-scan-backend.result }} |"  >> "$GITHUB_STEP_SUMMARY"
          echo "| Sign & Attest Frontend   | ${{ needs.sign-attest-frontend.result }} |"     >> "$GITHUB_STEP_SUMMARY"
          echo "| Sign & Attest Frontend   | ${{ needs.sign-attest-backend.result }} |"     >> "$GITHUB_STEP_SUMMARY"
          echo "----------------------------------"                                         >> "$GITHUB_STEP_SUMMARY"
          echo "## Deploy"                                      >> "$GITHUB_STEP_SUMMARY"
          echo "| Stage              | Status |"               >> "$GITHUB_STEP_SUMMARY"
          echo "|--------------------|--------|"               >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Frontend     | ${{ needs.build-frontend.result }} |"           >> "$GITHUB_STEP_SUMMARY"
          echo "| Build Backend      | ${{ needs.build-backend.result }} |"             >> "$GITHUB_STEP_SUMMARY"
          echo "| Dev (client)       | ${{ needs.deploy-dev-frontend.result }} |"       >> "$GITHUB_STEP_SUMMARY"
          echo "| Dev (server)       | ${{ needs.deploy-dev-backend.result }} |"        >> "$GITHUB_STEP_SUMMARY"
#          echo "| Staging (client)   | ${{ needs.deploy-staging-frontend.result }} |" >> "$GITHUB_STEP_SUMMARY"
#          echo "| Staging (server)   | ${{ needs.deploy-staging-backend.result }} |" >> "$GITHUB_STEP_SUMMARY"
#          echo "| Prod (client)      | ${{ needs.deploy-prod-frontend.result }} |"    >> "$GITHUB_STEP_SUMMARY"
#          echo "| Prod (server)      | ${{ needs.deploy-prod-backend.result }} |"    >> "$GITHUB_STEP_SUMMARY"
